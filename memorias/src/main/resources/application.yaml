server:
  port: ${PORT:8080}

spring:
  application:
    name: memorias-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/memorias_auth}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:tenorio26}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true

app:
  jwt:
    secret: ${JWT_SECRET:memorias-super-secret-key-change-this-value-please-123456789}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  google:
    client-id: ${GOOGLE_CLIENT_ID:}